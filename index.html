<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Pemantauan TP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
</head>
<body class="bg-gradient-to-br from-blue-500 to-purple-600 min-h-screen flex items-center justify-center dark:bg-gray-900">
  <div id="login-page" class="w-full max-w-md mx-auto p-6 bg-white/30 backdrop-blur-lg rounded-3xl shadow-2xl animate__animated animate__fadeInDown">
    <div class="text-center mb-6">
      <img src="https://via.placeholder.com/80" alt="Logo Sekolah" class="mx-auto rounded-full shadow-lg">
      <h2 class="text-2xl font-bold text-white mt-3">Log Masuk</h2>
    </div>
    <div class="space-y-4">
      <input id="username" type="text" placeholder="Username" class="w-full px-4 py-3 rounded-lg border-none outline-none">
      <input id="password" type="password" placeholder="Password" class="w-full px-4 py-3 rounded-lg border-none outline-none">
      <button id="login-btn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg transition">Log Masuk</button>
    </div>
  </div>

  <!-- Halaman utama (hidden) -->
  <div id="main-app" class="hidden w-full min-h-screen">
    <!-- Navbar dan kandungan akan dimasukkan oleh JavaScript -->
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="app.js"></script>
</body>
</html>
